# 核心交付：
# 1. From 协议 / 隐式错误上卷：AppError 包含 FsError 时 ? 自动封箱，
#    消除 .map_err() 地狱（~500 LOC）
# 2. Typed errors：FsError/JsonError/CollectionError enum +
#    通用 Error { code: i32, msg: string }（1.0 务实方案）（~400 LOC）
# 3. Stdlib effect 标注：io/fs/net/random → @io/@blocking，
#    mymath/collections/strings → @pure（~300 LOC）
# 4. defer LIFO：控制流离开 scope 时 defer 按逆序执行，? 和 panic 均触发（~400 LOC）
# 5. Comptime 纯度强制：is_comptime 函数 Checker 校验 Effect=pure，
#    io/ffi/alloc 调用 → 编译错误（~300 LOC）
# 6. API 清洗：array 合并到 collections，iter 标记 experimental，
#    命名统一（~200 LOC）
# 7. mymath checked 变体：try_div/try_factorial → Result<T, MathError>，
#    默认 Panic 被 Actor 吸收到 Fault（~200 LOC）
# 8. 错误通道区分：契约违背 → abort，环境失败 → 错误码/Result（~200 LOC）
#
# 门禁：
# - 全量 cargo test 连续两次绿
# - L1 双后端等价性保持
# - ? 自动上卷测试（嵌套 Result 不同错误类型）
