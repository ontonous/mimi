# === 性能优化窗口（0.31.20，Phase A→B 之间）===

[[milestone]]
version = "0.31.20"
kind = "implementation"
title = "Runtime Efficiency：解释器热路径与 codegen 优化"
requirements = []
# 插入原因：0.31.8–19 建立了 Flow/Actor/Session/Protocol 完整功能骨架，
# 但解释器热路径存在结构性效率问题（每次函数调用 body 扫描、202-arm 字符串
# dispatch、Value 深拷贝膨胀、LLVM 优化默认关闭）。在语言冻结（Phase B）和
# 组件边界（Phase C）大量新增代码前完成热路径优化，避免性能债复合增长。
#
# 核心交付（0 新 stable feature，纯内部优化）：
#
# 1. call_named dispatch 重构：
#    - 202-arm 字符串 match → 静态 dispatch table（HashMap<&'static str, BuiltinFn>
#      或 phf 编译期完美哈希）
#    - call_method 外层 Value match + 内层字符串方法名 match 合并为
#      (ValueDiscriminant, method_id) 二级索引
#
# 2. call_method scope 嵌套消除：
#    - trait/impl method dispatch 的 with_scope 闭包导致双层 scope push/pop
#    - 改为直接传 self 引用，消除闭包分配和重复 scope 操作
#
# 3. Value 热路径 clone 消减：
#    - bind/bind_mut 改为接受 &Value 或 Cow<Value>，仅在需要修改时 clone
#    - 参数传递路径（eval_call → call_named → call_func）减少中间 Vec<Value> 分配
#    - old_snapshots 仅在 verify_contracts && has_ensures 时分配（0.31.19 追加 B 已加标记）
#
# 4. LLVM codegen 优化级别：
#    - 默认 OptimizationLevel 从 None 提升至 O1（安全优化，不改变语义）
#    - MIMI_OPT 环境变量保留为 O2/O3 升级开关
#    - 更新 codegen golden 文件（UPDATE_GOLDEN=1 cargo test codegen_golden）
#
# 5. 性能基线与 CI 集成：
#    - Criterion benchmark（benches/interp.rs）纳入 CI（continue-on-error: true）
#    - 记录基线数据：fib(30)、list_sum(1000)、string_concat(100)、match_enum
#    - 基线数据归档到 reports/perf-baseline-0.31.20.md
#    - mimi run --profile 输出格式标准化（top-20 函数 + 总时间）
#
# 6. Interpreter 结构体瘦身（可选，视预算）：
#    - 审计 Interpreter<'a> ~170 个字段，将冷路径字段（comptime_results、
#      derive_expansion_error 等）移入 Box<InterpreterCold> 减少热路径 cache miss
#
# 预算：≤3000 LOC 净变更（重构为主，非新增）
# 门禁：
# - 全量 cargo test 连续两次绿
# - real_world 69/69 双后端通过（flow_test_macros.mimi 除外）
# - L1 双后端等价性保持（cargo test dual_ 全绿）
# - L2 类型系统健全性保持（cargo test typecheck:: 全绿）
# - benchmark 数据记录到 reports/
# - 无新增 P0、silent fallback、warning-only
# - codegen golden 文件更新后无回归
#
# 完成状态（v4 更新）：
# ✅ 追加 B（FuncDef O(1) flags + arity 合并 + mutate 守卫）— 提前到 0.31.19 交付
# ✅ ED-10 named-arg 重排序去重
# ✅ B9 闭包 malloc 确认已有 register_heap_alloc 机制
# ✅ CG-H16 ValueHandle untag 确认已修 (14582d18)
# ✅ 性能基线 benchmark（8 个，含 list_sum_1000 + string_concat_100）
# ⏭ call_named dispatch table — Rust match on &str 编译为高效跳转表，ROI 不足，deferred post-1.0
# ⏭ call_method scope 嵌套 — with_scope 闭包在 Rust 中零开销（单态化+内联），跳过
# ⏭ Interpreter 结构体瘦身 — 移入 0.31.45 DEBUG 周期
# ❌ ED-3 Value clone 消减 → 移入 0.31.21（需独立 sprint）
# ❌ LLVM O1 默认 → 移入 0.31.21（? 操作符 + extern codegen bug 需先修）

