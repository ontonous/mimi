# === Phase A 追加：地基深修（0.31.16–0.31.18）===

[[milestone]]
version = "0.31.16"
kind = "implementation"
title = "地基深修 I：Flow generation 与类型级线性"
requirements = ["FLOW-IDENTITY-001", "RESOURCE-LINEAR-001"]
# 核心交付：
# - Flow 状态类型从 plain Record 升级为带 generation 的线性 wrapper
#   （ResolvedType 层面标记 non-copyable + generation counter）
# - 自循环产生新 generation，旧别名在类型层面失效（非名字追踪）
# - CFG dataflow 对 Flow 状态完整触发（move/drop/return/branch-merge）
# - 删除 consumed_flow_vars: HashMap<String, String>，全部由 CFG 接管
# - interp/codegen 适配新类型表示（0.31.9–12 路径可能需要调整）
# - 【追加】Channel<T>/Mutex<T> guard token/AtomicI32/I64/Bool 纳入 is_linear()
#   （与 Flow 状态同一个谓词修改，resource_lower.rs:695-707）
# 门禁：
# - let b = s0; Flow::inc(s0); use(b) → 编译错误（非 warning）
# - Flow::tick(s0) 自循环后 use(s0) → 编译错误（generation 失效）
# - shared s = flow_state → 编译错误
# - let b = ch; channel_send(ch, v); channel_recv(b) → 编译错误（Channel 线性）
# - 全量测试连续两次绿

[[milestone]]
version = "0.31.17"
kind = "implementation"
title = "地基深修 II：高阶交互闭环"
requirements = ["RESOURCE-LINEAR-001", "FLOW-IDENTITY-001"]
# 核心交付：
# - Flow 状态通过泛型函数：线性在 TypeVar instantiate 后保留
#   （identity(state) 返回后原变量已消费）
# - 闭包捕获 Flow 状态：拒绝或转移（对标 cap 捕获语义）
# - Flow 状态存入集合（List/Map/Set）：类型级拒绝
# - Session 在集合/泛型中的线性保持验证
# - Protocol × 泛型边界文档化（dyn Protocol 不可能，记录原因）
# - ≥30 个负测试覆盖所有非法 Flow 状态操作
# - 错误信息可理解（不是裸 E0423，带 help 文本）
# - 【追加】双后端拒绝等价测试：≥5 个用例验证 interp 和 codegen
#   在 checker 被绕过时独立拒绝线性违反（L1 不变量的错误路径）
# 门禁：
# - identity(s0) 后 use(s0) → 编译错误
# - fn() { Flow::inc(s0) } 捕获 → 编译错误或转移语义
# - [s0, s1] → 编译错误
# - 双后端拒绝等价：绕过 checker 直接调 backend 时，interp/codegen 均拒绝
# - 全量测试连续两次绿

