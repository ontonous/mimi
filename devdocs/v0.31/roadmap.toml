requirements = []
# 九轮盲审统一排期。P0 soundness 修复，必须在语言冻结前完成。
#
# 核心交付：
# 1. RC ABA 修复：mimi_rc_upgrade 原子 CAS 保护，refcount 归零后 upgrade 返回 null（~200 LOC）
# 2. Quote soundness hole：移除 quote.rs 静默过滤（Requires/Ensures/Math），
#    生成 AST 必须送回 Checker 完整 re-check + lowering（~500 LOC）
# 3. Builtins 废除 sentinel：socket()/bind()/listen() 等返回 Result<i32, OSError>，
#    -1 拦截在 builtin 定义处（~800 LOC）
# 4. 统一分配器：mimi_alloc()/mimi_free() 封装，#[cfg(miri)] 指向 Rust alloc，
#    禁止直接调用 libc::malloc/free（~300 LOC）
# 5. Drop/Transition IR 防漏网断言：生成 Drop/Transition IR 前断言资源未被二次消费（~100 LOC）
# 6. Spec 修正：Shadow MTE 废止、Fast-Math 禁止、O2=experimental、
#    Comptime "完全排除"→"常量折叠"、最高优化=内联+DCE+SROA
# 7. ARCHITECTURE.md（500 字 runtime 架构文档）
#
# 门禁：
# - 全量 cargo test 连续两次绿
# - L1 双后端等价性保持
# - mimi_rc_upgrade 并发压力测试通过
# - quote! 生成代码经过完整 check
# - builtins 无裸 i32 错误码返回

[[milestone]]
version = "0.31.23"
kind = "implementation"
title = "Runtime 架构升级（去字符串化 + 去全局锁）"
requirements = []
# 九轮盲审统一排期。Runtime 三大原罪修复：类型丢失、全局锁、契约裸奔。
#
# 核心交付：
# 1. List Typed Storage：废除字符串化存储，标量（i32/i64/f64）连续内存块，
#    复杂对象存指针。mimi_list_push_i64 直接按值写内存（~1500 LOC）
# 2. Value 删除 #[derive(Clone)]：手写 impl Clone，
#    FlowState/SessionChan/Capability → panic!("linear resource clone")（~300 LOC）
# 3. 可变堆类型 Rc<RefCell>：List/Map/Set 包裹 Rc<RefCell<...>>，
#    查找时只拷贝智能指针，保证多处引用指向同一内存（~800 LOC）
# 4. Comptime FFI 白名单：Comptime 执行禁用所有 FFI 路径，遇到 extern → abort（~200 LOC）
# 5. Quote Gensym/UUID 卫生性：生成 AST 变量打不可见生成代，防 Z3 命名冲突（~200 LOC）
#
# 门禁：
# - 全量 cargo test 连续两次绿
# - L1 双后端等价性保持
# - real_world 69/69 双后端通过
# - List<f64> 精度往返测试（IEEE-754 无损）
# - Value::FlowState.clone() → panic 测试

