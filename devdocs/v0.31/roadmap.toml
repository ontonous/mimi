#   无注解时 = 稀疏图（未声明对 → 编译错误），@dense 显式启用 N×M Fault 注入
#   对齐 language-spec.md §3.5："Stable mode prohibits auto-completing undeclared combinations"
# - 【v4 吸收 AD-5】6 个独立 type walker 合并：
#   新增 TypeVisitor trait（谓词型 walker），将 occurs_in/is_escape_type/scan_residual/
#   contains_infer_artifacts/contains_inference_variables/contains_unresolved_type
#   迁移到 TypeFolder/TypeVisitor 抽象（~400 LOC 净减）
#
# 【架构修正案追加】（devdocs/v0.31/architecture-amendment-1.0.md）：
# 追加 B：View/Mutate 借用（条款 6，1.0 必须）
#   - transition body 内 view/mutate 修饰符传递 Payload 资源给纯函数
#   - 禁止嵌套 Flow 后 Payload 是普通数据，&/&mut 在单次 Turn 词法作用域内可判定
#   - 两条局部规则：① 禁止在借用作用域内触发状态转移 ② 禁止 Drop 当前 Payload 成员
#   - DSP 44100 采样/秒：就地修改 buffer，不 consume 整个 Payload
#   - 预估 ~1500-2000 LOC
#   - 门禁：apply_filter(mutate self.buffer, sample) 编译通过 + 双后端等价
# 追加 C：Multi-target 转移（条款 7，1.0 必须，从 0.31.44 提前）
#   - transition decide(Pending) -> Approved | Rejected 表示为 Tagged Union
#   - LLVM Codegen Lowering 为带 Tag 的 C 结构体
#   - 调用方必须 match 所有目标状态
#   - 预估 ~1000-1500 LOC
#   - 门禁：multi-target 双后端等价 + 未穷尽 match → 编译错误

