[[milestone]]
version = "0.31.19"
kind = "audit"
title = "攻击审查 I（Flow/Actor/Session/resource 线性 + ABI 前置验证）"
requirements = []
# 审查范围（基于 0.31.16–18 闭环后的地基）：
# - Flow 状态线性：所有别名/泛型/闭包/集合路径是否被拒绝
# - Generation 失效：自循环/多目标转移后旧值是否不可用
# - Actor runs Flow：Actor 边界外能否通过别名操作内部 Flow 状态
# - Session × Flow 交互：session endpoint 在 Flow transition 中的线性
# - exactly-once：Fault/kill/timeout 后资源是否恰好消费一次
# - 【ABI 前置验证】extern "C" 调用返回 struct { char*; char* } 的 C 函数，
#   验证 Mimi 侧字段偏移与 C 侧 _Static_assert(offsetof(...)) 一致
# - 【ABI 前置验证】#[repr(C)] 在 x86_64 Linux 下 padding 正确（含嵌套/数组/对齐属性）
# 门禁：
# - 0 新增 P0
# - 发现的 P1 有 owner 和 deadline
# - 审查报告归档
# - ABI 偏移验证通过（不通过则阻断 Phase C，插入 DataLayout 修复）

