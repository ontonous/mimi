name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LLVM_SYS_180_PREFIX: /tmp/llvm-wrapper

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev llvm-18 libllvm18 libpolly-18-dev 2>/dev/null || \
          sudo apt-get install -y -qq llvm-18-dev llvm-18 libllvm18

      - name: Setup LLVM wrapper
        run: bash scripts/setup-llvm-wrapper.sh

      - name: Install system deps
        run: sudo apt-get install -y -qq libz3-dev libffi-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --deny warnings
