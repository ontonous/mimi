name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LLVM_SYS_181_PREFIX: /tmp/llvm-wrapper

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and deps
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev llvm-18 libllvm18 libclang-18-dev 2>&1 | tail -5
          sudo apt-get install -y libpolly-18-dev 2>&1 || echo "Polly dev not found, will use wrapper stub"

      - name: Setup LLVM wrapper
        run: bash -x scripts/setup-llvm-wrapper.sh

      - name: Install additional system deps
        run: sudo apt-get install -y -qq libz3-dev libffi-dev binutils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"

      - name: Check Format
        run: cargo fmt -- --check

      - name: Pre-build runtime (prime cache)
        run: rustc --edition 2021 --crate-type staticlib --cfg standalone --crate-name mimi_runtime -o /tmp/mimi_runtime_test.a src/runtime/standalone.rs

      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: unsafe SAFETY gate (non-runtime baseline)
        run: python3 scripts/check_unsafe_safety.py

  test:
    name: Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and deps
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev llvm-18 libllvm18 libclang-18-dev 2>&1 | tail -5
          sudo apt-get install -y libpolly-18-dev 2>&1 || echo "Polly dev not found, will use wrapper stub"

      - name: Setup LLVM wrapper
        run: bash -x scripts/setup-llvm-wrapper.sh

      - name: Install additional system deps
        run: sudo apt-get install -y -qq libz3-dev libffi-dev binutils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-cache"

      - name: Pre-build runtime (prime cache)
        run: rustc --edition 2021 --crate-type staticlib --cfg standalone --crate-name mimi_runtime -o /tmp/mimi_runtime_test.a src/runtime/standalone.rs

      - name: Build
        run: cargo build --workspace

      - name: L1 dual-backend equivalence
        run: cargo test dual_ -- --test-threads=2

      - name: L2 type-system soundness
        run: "cargo test typecheck:: -- --test-threads=2"

      - name: FFI contract equivalence
        run: cargo test ffi_ -- --test-threads=2

      - name: Codegen E2E
        run: cargo test codegen_e2e -- --test-threads=2

      - name: Test (full suite)
        run: cargo test -- --test-threads=2
