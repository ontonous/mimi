name: Release

on:
  push:
    tags: ["mimi-v*"]

env:
  LLVM_SYS_180_PREFIX: /tmp/llvm-wrapper
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev llvm-18 libllvm18 || true
          # libpolly-18-dev is optional; wrapper script creates stubs if missing

      - name: Setup LLVM wrapper
        run: bash scripts/setup-llvm-wrapper.sh

      - name: Install system deps
        run: sudo apt-get install -y -qq libz3-dev libffi-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --workspace

      - name: Strip binary
        run: strip target/release/mimi

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#mimi-v}"
          mkdir -p dist
          cp target/release/mimi dist/
          cp README.md LICENSE dist/
          cd dist
          tar czf "../mimi-${VERSION}-x86_64-linux.tar.gz" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mimi ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: mimi-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
