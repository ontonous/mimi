probe = "LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test core::cfg::dataflow -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test borrow_boundary -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test e2e_projected_ -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test e2e_index_reference -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test e2e_dynamic_index_reference -- --test-threads=1"
evidence = "Each shared/mutable borrow has a stable LoanId; backwards CFG use-def liveness installs point/edge-specific BorrowEnd actions. Multiple shared loans are accepted, mutable overlap conflicts with reads/writes/moves/drops, reborrows record their parent, and a loan live across a back-edge fails closed. Structured Place overlap separates sibling fields, tuple members, and distinct constant indexes; dynamic indexes and dereferences conflict conservatively. Interpreter and native recursively address nested fields, tuples, and constant/dynamic list indexes without temporary write-back, while existing view/mutate realloc checks remain active. Production checker borrow-state tables and textual NLL scanning are removed; only the test-only raw-AST CFG oracle and incomplete local-reference escape/reallocation proof remain, so the requirement stays partial."

