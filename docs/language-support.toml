probe = "LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test core::cfg -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test ownership_ -- --test-threads=1 && LLVM_SYS_180_PREFIX=/tmp/llvm-wrapper cargo test borrow_boundary -- --test-threads=1"
evidence = "CheckedProgram persists a validated CallableCfg and ResourceAnalysis for every function, nested function, actor/impl method, and transition. Stable semantic block/edge/local/resource/loan IDs do not depend on Vec position; every block has one terminator and reachable predecessors alone participate in deterministic fixed-point joins. Canonical actions are emitted directly from typed ResolvedBody places and CFG locations; capability/session/delegate transfers share ResourceId, compound capability return/drop is deterministic, terminal paths do not pollute joins, and loop back-edges reject live loans or inconsistent resource states. OwnershipLedger is now a compatibility projection rather than a production analysis input; unsupported partial-move patterns and cross-turn exactly-once remain incomplete, so the requirement stays partial."

