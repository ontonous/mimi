evidence = "Production consumers require CheckedProgram; canonical item/Flow/state/transition tables, per-function signatures (params/ret/effects/comptime), session type bodies, protocol topology, and actor field/method directories, capabilities, constants, traits, impls, type defs, and extern blocks, and function-body NodeMeta exist. Interpreter::from_checked and CodeGenerator::compile_checked install the exact (flow,event,source) transition table plus function/session/protocol/actor/cap/const/trait/impl/ownership/type/extern directories and Flow annotation quotas/persistent/transactional/metadata-shadow field sets; missing overloads/arity fail closed. Backend capability requirements are queryable on CheckedProgram. Flow impl Protocol lists are materialised for consumers. Transition targets and fallback/pinned flags are queryable from interp/codegen consumers. Transition event parameter arity is enforced from CheckedProgram. Ownership action summaries are installed into consumers. Function effects directories are installed into codegen/verifier. Comptime function names are installed into consumers. Function return types are installed into codegen/verifier. Extern function ABI maps are installed into consumers. Constant type/value materialization is installed into consumers. Typed call-site tables (callee/argc/kind) are materialised and installed into consumers. Call-site expected arity is bound when the callee function is known. Call-site callee effects are bound from function directories when known. Call-site callee return types are bound from function directories when known. Extern function signatures (arity/ret) are materialised and bound into call sites/consumers. Actor method signatures are materialised and installed into consumers. Trait/impl method signatures are materialised and installed into consumers. Protocol state payloads and transition records are materialised and installed into consumers. Session residual type displays are materialised and installed into consumers. TypeDef fields/variants/aliases are materialised and installed into consumers. Function parameter directories are installed into consumers. Capability combined_with maps are installed into consumers. Transition event parameter name/type directories are installed into consumers. Flow state payload field directories are installed into consumers. Actor field directories (name/type/mut) are installed into consumers. Backend capability requirements and NodeMeta counts are installed into consumers. Ownership ledger resource-name directories are installed into consumers. Extern no_panic/unsafe flags are installed into consumers. NodeMeta path sets are installed into consumers. NodeMeta precision maps are installed into consumers. Flow state name directories are installed into consumers. Flow event name directories and ResolvedItem kind maps are installed into consumers. Call-site by-owner indexes are installed into consumers. Ownership action detail directories are installed into consumers. Ownership branch-merge detail directories are installed into consumers. Flow transitions-by-flow detail directories are installed into consumers. Call-site by-callee indexes are installed into consumers. Flow transitions-by-event detail directories are installed into consumers. NodeMeta span directories are installed into consumers. Trait/impl method parameter and effect directories are installed into consumers. Protocol state-name and named-payload directories are installed into consumers. Actor method parameter and effect directories are installed into consumers. Extern function parameter name/type directories are installed into consumers. emit/bindgen entrypoints require CheckedProgram and Component backend validation before generation. Extern discovery for emit/bindgen consumes structured ResolvedExternFunc data and rejects duplicate projected symbols. Exported-function discovery consumes ResolvedFunction ABI metadata and rejects unsupported async/generic exports. Type discovery consumes complete ResolvedTypeDef declaration snapshots and rejects projected-name collisions. Raw File access is crate-private and explicitly limited to legacy body consumers. build --verify-ffi uses a checked API and validates resolved extern call identity/arity before the legacy contract-expression adapter. Checked FFI verification injects extern contracts from ResolvedExternFunc; raw AST remains only for caller bodies/argument expressions. Module-qualified flow mailbox depths resolve by bare actor/flow name. Verifier backend no longer blocks unrelated contract verification solely because a multi-target Flow is present. HM constraints use nested undo transactions, generic calls instantiate fresh variables through the canonical unifier, and CheckedProgram persists fail-closed zonked function signatures. Full raw-AST elimination and deeper body-level typed resolution remain incomplete."

